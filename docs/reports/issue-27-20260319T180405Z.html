<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SCAN: https://nsf.gov</title>
<style>
:root {
  --bg: #f4f7f4;
  --surface: #ffffff;
  --ink: #15201d;
  --muted: #5a6b64;
  --line: #d6e2dc;
  --accent: #0b6e4f;
  --code-bg: #eef1ef;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
  background: radial-gradient(circle at 10% 10%, #e7f6ef 0%, var(--bg) 55%);
  color: var(--ink);
}
main {
  max-width: 860px;
  margin: 2rem auto;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 2rem 2.5rem;
  box-shadow: 0 6px 24px rgba(7, 24, 16, 0.08);
}
nav { margin-bottom: 1.5rem; font-size: .9rem; }
a { color: var(--accent); }
h1 { font-size: 1.8rem; margin: 0 0 1rem 0; }
h2 { font-size: 1.25rem; margin: 1.5rem 0 .5rem 0; border-bottom: 1px solid var(--line); padding-bottom: .3rem; }
h3 { font-size: 1.05rem; margin: 1.25rem 0 .4rem 0; }
ul { padding-left: 1.4rem; line-height: 1.7; }
li { margin: .2rem 0; }
p { line-height: 1.6; }
code {
  background: var(--code-bg);
  border-radius: 4px;
  padding: .1em .35em;
  font-size: .9em;
  font-family: "IBM Plex Mono", "Fira Code", monospace;
}
pre { background: var(--code-bg); padding: 1rem; border-radius: 8px; overflow: auto; }
pre code { background: none; padding: 0; }
</style>
</head>
<body>
<main>
  <nav><a href="./">← Back to reports</a></nav>
  <div id="report"><h1>Open Site Review Report</h1>
<ul>
<li>Targets: defaults, not ie &lt;= 11</li>
<li>Unsupported threshold: 10%</li>
<li>Polyfill removable threshold: 5%</li>
<li>Files scanned: 0</li>
<li>Findings: 0</li>
<li>Scan mode: URL crawl (same-origin assets only)</li>
</ul>
<p>No findings detected for current rules and targets.</p></div>
</main>
</body>
</html>
