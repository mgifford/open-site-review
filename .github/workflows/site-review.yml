name: Site Review

on:
  pull_request:
    branches:
      - main
  issues:
    types: [opened, edited]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scanner with annotations
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            node src/cli.js --issue "${{ github.event.issue.html_url }}" --max-urls 50 --format github --ci
          else
            npm run scan:ci
          fi

      - name: Save markdown report artifact
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            node src/cli.js --issue "${{ github.event.issue.html_url }}" --max-urls 50 --format markdown > open-site-review-report.md
          else
            npm run scan -- --format markdown > open-site-review-report.md
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: open-site-review-report
          path: open-site-review-report.md
