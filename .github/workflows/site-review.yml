name: Site Review

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scanner with annotations
        run: npm run scan:ci

      - name: Save markdown report artifact
        run: npm run scan -- --format markdown > open-site-review-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: open-site-review-report
          path: open-site-review-report.md
