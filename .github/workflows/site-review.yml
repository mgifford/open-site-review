name: Site Review

permissions:
  contents: read
  issues: write

on:
  pull_request:
    branches:
      - main
  issues:
    types: [opened, reopened]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scanner with annotations
        if: github.event_name != 'issues'
        run: npm run scan:ci

      - name: Generate issue report
        if: github.event_name == 'issues'
        run: |
          node src/cli.js --issue "${{ github.event.issue.html_url }}" --max-urls 50 --format markdown > open-site-review-report.md

      - name: Save markdown report artifact
        if: github.event_name != 'issues'
        run: |
          npm run scan -- --format markdown > open-site-review-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: open-site-review-report
          path: open-site-review-report.md

      - name: Comment report on issue
        if: github.event_name == 'issues' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            let report = fs.readFileSync('open-site-review-report.md', 'utf8');
            const maxLen = 60000;
            if (report.length > maxLen) {
              report = `${report.slice(0, maxLen)}\n\n... Report truncated in comment. Full report is in workflow artifacts.`;
            }

            const body = [
              'Automated site review completed for this issue URL list.',
              '',
              report
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Close issue after report
        if: github.event_name == 'issues' && success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
