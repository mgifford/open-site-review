name: Site Review

permissions:
  contents: write
  issues: write

on:
  pull_request:
    branches:
      - main
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue:
        description: 'GitHub issue URL or owner/repo#number to scan (e.g. https://github.com/owner/repo/issues/1 or owner/repo#1)'
        required: false
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve issue context
        id: issue_ctx
        if: (github.event_name == 'issues' && startsWith(github.event.issue.title, 'Scan:')) || (github.event_name == 'workflow_dispatch' && inputs.issue != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "issue_ref=${{ github.event.issue.html_url }}" >> "$GITHUB_OUTPUT"
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "issue_title=${{ github.event.issue.title }}" >> "$GITHUB_OUTPUT"
            echo "issue_url=${{ github.event.issue.html_url }}" >> "$GITHUB_OUTPUT"
          else
            ISSUE_INPUT="${{ inputs.issue }}"
            echo "issue_ref=${ISSUE_INPUT}" >> "$GITHUB_OUTPUT"
            if [[ "${ISSUE_INPUT}" =~ /issues/([0-9]+) ]]; then
              ISSUE_NUM="${BASH_REMATCH[1]}"
            elif [[ "${ISSUE_INPUT}" =~ \#([0-9]+)$ ]]; then
              ISSUE_NUM="${BASH_REMATCH[1]}"
            else
              echo "::error::Cannot extract issue number from '${ISSUE_INPUT}'. Provide a GitHub issue URL (https://github.com/owner/repo/issues/N) or owner/repo#N format."
              exit 1
            fi
            echo "issue_number=${ISSUE_NUM}" >> "$GITHUB_OUTPUT"
            ISSUE_TITLE=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}" --jq '.title' 2>/dev/null || echo "Unable to fetch title for Issue #${ISSUE_NUM}")
            echo "issue_title=${ISSUE_TITLE}" >> "$GITHUB_OUTPUT"
            echo "issue_url=https://github.com/${{ github.repository }}/issues/${ISSUE_NUM}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scanner with annotations
        if: github.event_name != 'issues' && !(github.event_name == 'workflow_dispatch' && inputs.issue != '')
        run: npm run scan:ci

      - name: Generate issue report
        if: steps.issue_ctx.outputs.issue_ref != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node src/cli.js --issue "${{ steps.issue_ctx.outputs.issue_ref }}" --max-urls 50 --format markdown > open-site-review-report.md

      - name: Save markdown report artifact
        if: github.event_name != 'issues' && !(github.event_name == 'workflow_dispatch' && inputs.issue != '')
        run: |
          npm run scan -- --format markdown > open-site-review-report.md

      - name: Publish issue report to GitHub Pages
        id: publish_pages
        if: steps.issue_ctx.outputs.issue_ref != '' && success()
        env:
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue_ctx.outputs.issue_title }}
          ISSUE_URL: ${{ steps.issue_ctx.outputs.issue_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          mkdir -p docs/reports
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          REPORT_REL="reports/issue-${ISSUE_NUMBER}-${TS}.md"
          cp open-site-review-report.md "docs/${REPORT_REL}"

          node scripts/update-pages-index.js docs "${REPORT_REL}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/reports docs/reports.json docs/reports.html
          git commit -m "Add report for issue #${ISSUE_NUMBER}" || echo "No changes to commit"
          git push origin main

          echo "report_url=https://${OWNER}.github.io/${REPO_NAME}/${REPORT_REL}" >> "$GITHUB_OUTPUT"
          echo "reports_url=https://${OWNER}.github.io/${REPO_NAME}/reports.html" >> "$GITHUB_OUTPUT"

      - name: Upload report
        if: steps.issue_ctx.outputs.issue_ref != '' || github.event_name != 'issues'
        uses: actions/upload-artifact@v4
        with:
          name: open-site-review-report
          path: open-site-review-report.md

      - name: Comment report on issue
        if: steps.issue_ctx.outputs.issue_ref != '' && success()
        uses: actions/github-script@v7
        env:
          REPORT_URL: ${{ steps.publish_pages.outputs.report_url }}
          REPORTS_URL: ${{ steps.publish_pages.outputs.reports_url }}
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
        with:
          script: |
            const fs = require('node:fs');
            let report = fs.readFileSync('open-site-review-report.md', 'utf8');
            const maxLen = 50000;
            if (report.length > maxLen) {
              report = `${report.slice(0, maxLen)}\n\n... Report truncated in comment. Full report is published on GitHub Pages and in workflow artifacts.`;
            }

            const body = [
              'Automated site review completed for this issue URL list.',
              `Full report: ${process.env.REPORT_URL}`,
              `Reports index: ${process.env.REPORTS_URL}`,
              '',
              report
            ].join('\n');

            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            if (isNaN(issueNumber) || issueNumber <= 0) {
              core.setFailed(`Invalid issue number: ${process.env.ISSUE_NUMBER}`);
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });

      - name: Close issue after report
        if: steps.issue_ctx.outputs.issue_number != '' && success()
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            if (isNaN(issueNumber) || issueNumber <= 0) {
              core.setFailed(`Invalid issue number: ${process.env.ISSUE_NUMBER}`);
              return;
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });
