name: Site Review

permissions:
  contents: write
  issues: write

on:
  pull_request:
    branches:
      - main
  issues:
    types: [opened, reopened]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scanner with annotations
        if: github.event_name != 'issues'
        run: npm run scan:ci

      - name: Generate issue report
        if: github.event_name == 'issues' && startsWith(github.event.issue.title, 'SCAN:')
        run: |
          node src/cli.js --issue "${{ github.event.issue.html_url }}" --max-urls 50 --format markdown > open-site-review-report.md

      - name: Save markdown report artifact
        if: github.event_name != 'issues'
        run: |
          npm run scan -- --format markdown > open-site-review-report.md

      - name: Publish issue report to GitHub Pages
        id: publish_pages
        if: github.event_name == 'issues' && startsWith(github.event.issue.title, 'SCAN:') && success()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          mkdir -p docs/reports
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          REPORT_REL="reports/issue-${ISSUE_NUMBER}-${TS}.md"
          cp open-site-review-report.md "docs/${REPORT_REL}"

          node scripts/update-pages-index.js docs "${REPORT_REL}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/reports docs/reports.json docs/reports.html docs/index.html
          git commit -m "Add report for issue #${ISSUE_NUMBER}" || echo "No changes to commit"
          git push origin main

          echo "report_url=https://${OWNER}.github.io/${REPO_NAME}/${REPORT_REL}" >> "$GITHUB_OUTPUT"
          echo "reports_url=https://${OWNER}.github.io/${REPO_NAME}/reports.html" >> "$GITHUB_OUTPUT"

      - name: Upload report
        if: github.event_name != 'issues' || startsWith(github.event.issue.title, 'SCAN:')
        uses: actions/upload-artifact@v4
        with:
          name: open-site-review-report
          path: open-site-review-report.md

      - name: Comment report on issue
        if: github.event_name == 'issues' && startsWith(github.event.issue.title, 'SCAN:') && success()
        uses: actions/github-script@v7
        env:
          REPORT_URL: ${{ steps.publish_pages.outputs.report_url }}
          REPORTS_URL: ${{ steps.publish_pages.outputs.reports_url }}
        with:
          script: |
            const fs = require('node:fs');
            let report = fs.readFileSync('open-site-review-report.md', 'utf8');
            const maxLen = 50000;
            if (report.length > maxLen) {
              report = `${report.slice(0, maxLen)}\n\n... Report truncated in comment. Full report is published on GitHub Pages and in workflow artifacts.`;
            }

            const body = [
              'Automated site review completed for this issue URL list.',
              `Full report: ${process.env.REPORT_URL}`,
              `Reports index: ${process.env.REPORTS_URL}`,
              '',
              report
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Close issue after report
        if: github.event_name == 'issues' && startsWith(github.event.issue.title, 'SCAN:') && success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
